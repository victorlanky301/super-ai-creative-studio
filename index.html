<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super AI Creative Studio</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🤖 Super AI Creative Studio</h1>
    <p>Study • Design • Create • Imagine</p>

    <input id="prompt" type="text" placeholder="Enter your idea (e.g. futuristic city at night)" />

      <button onclick="generateImage()">🎨 Generate Image</button>
      <button onclick="generateMovie()">🎬 Generate Movie</button>
    </div>

    <div id="output"></div>

    <img id="resultImage" />

  </div>

  <script src="script.js"></script>
</body>
</html>
